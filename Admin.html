<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lemon Cafe - Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        background-color: #f4f6f9;
        font-family: 'Poppins', sans-serif;
      }
      .admin-navbar {
        background-color: #5b2a02;
        color: white;
      }
      .admin-navbar .navbar-brand {
        color: rgb(255, 166, 0);
        font-weight: bold;
        font-size: 24px;
      }
      .card-stats {
        border: none;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
      .table-container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
      .nav-tabs .nav-link {
        color: #555;
        font-weight: 500;
        border: none;
        padding: 10px 20px;
      }
      .nav-tabs .nav-link.active {
        color: rgb(255, 166, 0);
        border-bottom: 3px solid rgb(255, 166, 0);
        background: none;
      }
    </style>
  </head>
  <body>
    <!-- Security Check (must be run immediately before rendering) -->
    <script>
      const currentUser = JSON.parse(localStorage.getItem('currentUser'));
      if (!currentUser || currentUser.role !== 'admin') {
        window.location.href = 'Anasayfa.html';
      }
    </script>

    <!-- Admin Navbar -->
    <nav class="navbar admin-navbar px-4 py-3">
      <span class="navbar-brand"><i class="bi bi-shield-lock-fill me-2"></i>Lemon Cafe Admin</span>
      <div class="d-flex align-items-center">
        <span class="me-3 d-none d-md-inline"><i class="bi bi-person-circle me-1"></i> Hoş geldin, Yönetici</span>
        <button id="logoutBtn" class="btn btn-outline-warning btn-sm"><i class="bi bi-box-arrow-right me-1"></i>Çıkış Yap</button>
      </div>
    </nav>

    <div class="container my-5">
      <!-- Stats Dashboard Cards -->
      <div class="row mb-5 text-center">
        <div class="col-md-3 mb-3">
          <div class="card card-stats p-3 bg-white text-dark">
            <h5 class="text-muted small uppercase">Toplam Kullanıcı</h5>
            <h2 id="statUsers" class="mb-0 fw-bold">0</h2>
            <i class="bi bi-people-fill text-primary fs-3 mt-2"></i>
          </div>
        </div>
        <div class="col-md-3 mb-3">
          <div class="card card-stats p-3 bg-white text-dark">
            <h5 class="text-muted small">Toplam Sipariş</h5>
            <h2 id="statOrders" class="mb-0 fw-bold">0</h2>
            <i class="bi bi-cart-fill text-warning fs-3 mt-2"></i>
          </div>
        </div>
        <div class="col-md-3 mb-3">
          <div class="card card-stats p-3 bg-white text-dark">
            <h5 class="text-muted small">Bekleyen Siparişler</h5>
            <h2 id="statPending" class="mb-0 fw-bold">0</h2>
            <i class="bi bi-hourglass-split text-danger fs-3 mt-2"></i>
          </div>
        </div>
        <div class="col-md-3 mb-3">
          <div class="card card-stats p-3 bg-white text-dark">
            <h5 class="text-muted small">Hazırlanan / Tamamlanan</h5>
            <h2 id="statCompleted" class="mb-0 fw-bold">0</h2>
            <i class="bi bi-check-circle-fill text-success fs-3 mt-2"></i>
          </div>
        </div>
      </div>

      <!-- Navigation Tabs -->
      <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="orders-tab"
            data-bs-toggle="tab"
            data-bs-target="#orders-panel"
            type="button"
            role="tab"
          >
            <i class="bi bi-cart4 me-2"></i>Siparişler
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="users-tab"
            data-bs-toggle="tab"
            data-bs-target="#users-panel"
            type="button"
            role="tab"
          >
            <i class="bi bi-people me-2"></i>Kullanıcılar
          </button>
        </li>
      </ul>

      <!-- Tabs Content -->
      <div class="tab-content">
        <!-- Orders Panel -->
        <div class="tab-pane fade show active" id="orders-panel" role="tabpanel">
          <div class="table-container">
            <h4 class="mb-4 text-dark fw-bold">Sipariş Yönetimi</h4>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Tarih</th>
                    <th>Müşteri E-posta</th>
                    <th>Ürün Adı</th>
                    <th>Adet</th>
                    <th>Durum</th>
                    <th>İşlemler</th>
                  </tr>
                </thead>
                <tbody id="ordersTableBody">
                  <!-- JS dynamically populates -->
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Users Panel -->
        <div class="tab-pane fade" id="users-panel" role="tabpanel">
          <div class="table-container">
            <h4 class="mb-4 text-dark fw-bold">Kullanıcı Yönetimi</h4>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Ad</th>
                    <th>Soyad</th>
                    <th>E-posta</th>
                    <th>Cinsiyet</th>
                    <th>İşlem</th>
                  </tr>
                </thead>
                <tbody id="usersTableBody">
                  <!-- JS dynamically populates -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Load data from localStorage
      function getData(key) {
        return JSON.parse(localStorage.getItem(key)) || [];
      }

      function saveData(key, data) {
        localStorage.setItem(key, JSON.stringify(data));
        render(); // Refresh page data representation
      }

      // Render tables and statistics
      function render() {
        const users = getData('users');
        const orders = getData('orders');

        // Update stats card numbers
        document.getElementById('statUsers').innerText = users.length;
        document.getElementById('statOrders').innerText = orders.length;
        
        const pendingCount = orders.filter(o => o.status === 'Beklemede').length;
        const activeCount = orders.filter(o => o.status === 'Hazırlanıyor' || o.status === 'Tamamlandı').length;
        
        document.getElementById('statPending').innerText = pendingCount;
        document.getElementById('statCompleted').innerText = activeCount;

        // Render Users Table
        const usersTbody = document.getElementById('usersTableBody');
        if (users.length === 0) {
          usersTbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">Kayıtlı kullanıcı bulunmuyor.</td></tr>`;
        } else {
          usersTbody.innerHTML = users.map((user, idx) => `
            <tr>
              <td>${escapeHtml(user.firstName)}</td>
              <td>${escapeHtml(user.lastName)}</td>
              <td>${escapeHtml(user.email)}</td>
              <td>${escapeHtml(user.gender)}</td>
              <td>
                <button class="btn btn-outline-danger btn-sm" onclick="deleteUser('${user.email}')">
                  <i class="bi bi-trash"></i> Sil
                </button>
              </td>
            </tr>
          `).join('');
        }

        // Render Orders Table
        const ordersTbody = document.getElementById('ordersTableBody');
        if (orders.length === 0) {
          ordersTbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">Sipariş bulunmuyor.</td></tr>`;
        } else {
          // Sort orders: oldest or newest first
          ordersTbody.innerHTML = orders.map((order, idx) => {
            let badgeClass = 'bg-danger-subtle text-danger';
            if (order.status === 'Hazırlanıyor') badgeClass = 'bg-warning-subtle text-warning-emphasis';
            if (order.status === 'Tamamlandı') badgeClass = 'bg-success-subtle text-success';

            let actionButtons = '';
            if (order.status === 'Beklemede') {
              actionButtons = `
                <button class="btn btn-warning btn-sm me-1" onclick="updateOrderStatus(${idx}, 'Hazırlanıyor')">
                  <i class="bi bi-play-fill"></i> Hazırla
                </button>
              `;
            } else if (order.status === 'Hazırlanıyor') {
              actionButtons = `
                <button class="btn btn-success btn-sm me-1" onclick="updateOrderStatus(${idx}, 'Tamamlandı')">
                  <i class="bi bi-check-lg"></i> Tamamla
                </button>
              `;
            }

            actionButtons += `
              <button class="btn btn-outline-danger btn-sm" onclick="deleteOrder(${idx})">
                <i class="bi bi-x-lg"></i> İptal
              </button>
            `;

            return `
              <tr>
                <td class="text-muted small">${new Date(order.date).toLocaleString()}</td>
                <td>${escapeHtml(order.userEmail)}</td>
                <td class="fw-semibold">${escapeHtml(order.itemName)}</td>
                <td>${order.quantity}</td>
                <td><span class="badge ${badgeClass} px-2 py-1">${order.status}</span></td>
                <td>${actionButtons}</td>
              </tr>
            `;
          }).join('');
        }
      }

      // Action Handlers
      window.deleteUser = function(email) {
        if (confirm('Bu kullanıcıyı silmek istediğinize emin misiniz?')) {
          let users = getData('users');
          users = users.filter(u => u.email !== email);
          saveData('users', users);
        }
      }

      window.deleteOrder = function(idx) {
        if (confirm('Siparişi iptal etmek ve listeden silmek istiyor musunuz?')) {
          const orders = getData('orders');
          orders.splice(idx, 1);
          saveData('orders', orders);
        }
      }

      window.updateOrderStatus = function(idx, newStatus) {
        const orders = getData('orders');
        if (orders[idx]) {
          orders[idx].status = newStatus;
          saveData('orders', orders);
        }
      }

      // Logout handler
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('currentUser');
        window.location.href = 'Anasayfa.html';
      });

      // Escape helper
      function escapeHtml(text) {
        if (!text) return '';
        const map = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, function(m) { return map[m]; });
      }

      // Initial execution
      render();
    </script>
  </body>
</html>
